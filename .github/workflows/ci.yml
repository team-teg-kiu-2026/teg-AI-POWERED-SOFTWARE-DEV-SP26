name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend · lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install flake8

      - name: Lint (syntax errors fail the build)
        run: flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run offline tests
        run: pytest -m "not integration" -v

  frontend:
    name: Frontend · lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://nutrismart-production-2965.up.railway.app

  docker:
    name: Backend · Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t nutrismart-backend ./backend

      - name: Smoke-test the image starts and /health responds
        run: |
          docker run -d --name nutrismart -e PORT=5000 -p 5000:5000 nutrismart-backend
          for i in $(seq 1 15); do
            if curl -fs http://localhost:5000/health; then echo "\nhealth OK"; exit 0; fi
            sleep 2
          done
          echo "health check failed"; docker logs nutrismart; exit 1
