# Railway build/deploy config for the NutriSmart backend.
# Builds from backend/Dockerfile; the image CMD runs gunicorn under `sh -c`
# so it correctly expands the $PORT Railway injects at runtime.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
